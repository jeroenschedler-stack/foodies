<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://fonts.googleapis.com https://fonts.gstatic.com https://api.anthropic.com data: blob:; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://firestore.googleapis.com https://api.anthropic.com wss://*.firebaseio.com wss://*.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.gstatic.com https://*.googleapis.com;">
<title>BED Foodies App</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BED Foodie">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0f14">
<link rel="apple-touch-icon" id="appleIcon" href="">
<link rel="icon" id="favicon" href="">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#161920; --surface2:#1e2230; --surface3:#252a3a;
    --accent:#f0a500; --accent2:#e06c2a; --green:#3ecf82; --red:#e05555;
    --yellow:#f5c842; --blue:#4a9eff; --text:#eeeae3; --muted:#6b7190;
    --border:rgba(255,255,255,0.06); --radius:16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:90px; overflow-x:hidden; }

  /* HEADER */
  .header { background:linear-gradient(180deg,#13161f 0%,#0d0f14 100%); padding:14px 16px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .logo { font-family:'Kanit',sans-serif; font-size:22px; font-weight:800; color:var(--accent); letter-spacing:-0.5px; line-height:1.1; }
  .logo .word-light { color:var(--text); font-weight:300; }
  .logo-sub { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-top:3px; }
  .header-dateline { font-family:'Kanit',sans-serif; font-size:18px; font-weight:700; color:var(--accent); margin-top:5px; line-height:1; }
  .admin-toggle-btn { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:6px 9px; font-size:16px; cursor:pointer; flex-shrink:0; color:var(--muted); transition:all 0.2s; margin-left:10px; }
  .admin-toggle-btn.active { border-color:var(--accent); background:rgba(240,165,0,0.1); }
  .hotel-tabs { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
  .hotel-tabs::-webkit-scrollbar { display:none; }
  .hotel-tab { flex-shrink:0; padding:7px 16px; border-radius:6px; border:1.5px solid var(--border); background:transparent; color:var(--muted); font-family:'Kanit',sans-serif; font-size:15.6px; font-weight:600; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
  .hotel-tab.active { background:var(--accent); border-color:var(--accent); color:#1a1000; }

  .content { padding:14px; }

  /* SYNC STATUS */
  .sync-bar { display:flex; align-items:center; gap:6px; padding:6px 14px; font-size:11px; font-family:'Kanit',sans-serif; font-weight:600; letter-spacing:0.5px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .sync-dot.online { background:var(--green); box-shadow:0 0 6px rgba(62,207,130,0.6); }
  .sync-dot.offline { background:var(--red); }
  .sync-dot.syncing { background:var(--yellow); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* MAIN CARD */
  .mtd-card { background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%); border-radius:var(--radius); padding:16px; margin-bottom:12px; border:1px solid var(--border); position:relative; overflow:hidden; }
  .mtd-card::after { content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; border-radius:50%; background:radial-gradient(circle,rgba(240,165,0,0.08) 0%,transparent 70%); pointer-events:none; }
  .card-title-row { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:4px; margin-bottom:2px; }
  .card-title-label { font-family:'Kanit',sans-serif; font-size:13px; font-weight:800; color:var(--text); letter-spacing:0.8px; text-transform:uppercase; }
  .card-title-pct { font-family:'Kanit',sans-serif; font-size:26px; font-weight:800; line-height:1; }
  .card-title-sub { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; text-align:right; margin-bottom:12px; }

  /* FOUR-COLUMN STATS */
  .stats4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; margin-bottom:12px; }
  .s4box { background:rgba(0,0,0,0.2); border-radius:10px; padding:8px 4px; text-align:center; border:1px solid var(--border); }
  .s4val { font-family:'Kanit',sans-serif; font-size:11px; font-weight:700; line-height:1; margin-bottom:3px; }
  .s4lbl { font-size:7.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; line-height:1.2; }

  /* PROGRESS BAR */
  .prog-outer { margin-bottom:6px; }
  .prog-track { background:rgba(255,255,255,0.06); border-radius:100px; height:22px; overflow:visible; position:relative; }
  .prog-fill { height:100%; border-radius:100px; transition:width 0.8s cubic-bezier(.4,0,.2,1); }
  .p-safe { background:linear-gradient(90deg,var(--green),#7de8b0); }
  .p-warn { background:linear-gradient(90deg,var(--yellow),#f5a500); }
  .p-danger { background:linear-gradient(90deg,var(--red),#ff8a8a); }
  .prog-marker { position:absolute; top:-5px; bottom:-5px; left:50%; width:3px; background:rgba(255,255,255,0.75); border-radius:2px; z-index:2; transform:translateX(-50%); }
  .prog-labels { display:flex; margin-top:6px; font-size:12px; font-weight:600; color:var(--text); }
  .prog-labels span { flex:1; }
  .prog-labels .pl-l { text-align:left; }
  .prog-labels .pl-c { text-align:center; }
  .prog-labels .pl-r { text-align:right; }

  /* FORECAST CARD */
  .forecast-card { background:var(--surface); border-radius:var(--radius); padding:14px 16px; border:1px solid var(--border); margin-bottom:12px; }
  .forecast-set { display:flex; justify-content:space-between; align-items:center; background:rgba(62,207,130,0.07); border:1px solid rgba(62,207,130,0.2); border-radius:12px; padding:12px 14px; }
  .forecast-set-val { font-family:'Kanit',sans-serif; font-size:18px; font-weight:700; color:var(--accent); }
  .forecast-edit-btn { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:5px 14px; color:var(--muted); font-family:'Kanit',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }

  /* ACTION BUTTONS */
  .action-pair { display:flex; gap:10px; margin-bottom:14px; }
  .action-card { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:18px 8px 14px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:10px; transition:background 0.18s; user-select:none; }
  .action-card:active { background:var(--surface2); }
  .action-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; text-align:center; font-family:'Sarabun',sans-serif; line-height:1.3; }

  /* CATEGORY ROWS */
  .supplier-grid { display:flex; flex-direction:column; gap:5px; }
  .supplier-row { background:var(--surface); border-radius:10px; padding:8px 12px; border:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .sup-icon { font-size:15px; width:22px; text-align:center; flex-shrink:0; }
  .sup-name { font-family:'Kanit',sans-serif; font-size:13px; font-weight:600; flex:1; }
  .sup-mtd { font-size:11px; color:var(--accent); font-weight:600; font-family:'Kanit',sans-serif; white-space:nowrap; margin-right:8px; }
  .sup-add { background:var(--surface2); border:1.5px solid var(--border); border-radius:7px; padding:4px 11px; color:var(--accent); font-family:'Kanit',sans-serif; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; }

  /* ALL HOTELS */
  .all-grid { display:flex; flex-direction:column; gap:10px; }
  .hotel-mini { background:var(--surface); border-radius:var(--radius); padding:14px 16px; border:1px solid var(--border); }

  /* SEC TITLE */
  .sec-title { font-family:'Kanit',sans-serif; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin:18px 0 8px; display:flex; justify-content:space-between; align-items:center; }

  /* ENTRIES */
  .entry-list { display:flex; flex-direction:column; gap:7px; }
  .entry-item { background:var(--surface); border-radius:12px; padding:11px 13px; border:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .entry-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .entry-info { flex:1; min-width:0; }
  .entry-sup { font-size:11px; color:var(--muted); }
  .entry-note { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .entry-right { text-align:right; flex-shrink:0; }
  .entry-amt { font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; color:var(--red); }
  .entry-time { font-size:10px; color:var(--muted); }
  .entry-hotel-tag { font-size:10px; font-weight:700; font-family:'Kanit',sans-serif; background:var(--surface2); padding:2px 7px; border-radius:10px; color:var(--accent); display:inline-block; margin-bottom:2px; }
  .entry-actions { display:flex; gap:5px; margin-left:6px; flex-shrink:0; }
  .entry-action-btn { background:none; border:none; cursor:pointer; padding:4px; border-radius:6px; font-size:14px; transition:background 0.15s; color:var(--muted); }
  .entry-action-btn:hover { background:var(--surface3); }
  .entry-action-btn.del:hover { color:var(--red); }
  .entry-action-btn.edit:hover { color:var(--accent); }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:10px 0 18px; z-index:100; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 0; }
  .nav-btn .ni { width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--muted); }
  .nav-btn.active .ni { color:var(--accent); }
  .nav-btn .nl { font-size:10px; font-family:'Kanit',sans-serif; font-weight:700; letter-spacing:0.8px; color:var(--muted); text-transform:uppercase; }
  .nav-btn.active .nl { color:var(--accent); }

  /* TOAST */
  .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--green); color:#fff; padding:10px 20px; border-radius:30px; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; z-index:999; transition:transform 0.3s cubic-bezier(.4,0,.2,1); white-space:nowrap; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .empty { text-align:center; padding:28px 20px; color:var(--muted); font-size:14px; }
  .empty .ei { font-size:34px; margin-bottom:8px; }

  /* MODALS */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:24px 24px 0 0; padding:20px 18px 40px; width:100%; max-width:480px; border-top:1px solid var(--border); animation:slideUp 0.3s cubic-bezier(.4,0,.2,1); max-height:92vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-handle { width:38px; height:4px; background:var(--surface3); border-radius:2px; margin:0 auto 18px; }
  .modal-title { font-family:'Kanit',sans-serif; font-size:20px; font-weight:800; margin-bottom:16px; }
  .modal-title span { color:var(--accent); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .modal-btns { display:flex; gap:8px; margin-top:14px; }
  .btn-cancel { flex:1; padding:13px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; font-family:'Kanit',sans-serif; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; }
  .btn-save { flex:2; padding:13px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; color:#1a1000; cursor:pointer; }
  .btn-main { width:100%; padding:13px; margin-top:10px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; font-family:'Kanit',sans-serif; font-size:15px; font-weight:700; color:#1a1000; cursor:pointer; }
  input[type=number],input[type=text],select { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:11px 13px; font-family:'Sarabun',sans-serif; font-size:15px; color:var(--text); outline:none; transition:border-color 0.2s; -webkit-appearance:none; width:100%; }
  input:focus,select:focus { border-color:var(--accent); }
  input::placeholder { color:var(--muted); }
  select option { background:var(--surface2); }
  .rev-row { display:flex; gap:8px; align-items:center; }
  .baht { font-family:'Kanit',sans-serif; font-size:22px; color:var(--accent); font-weight:700; }

  /* SCAN */
  .scan-spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(240,165,0,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .scan-confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; align-items:flex-end; justify-content:center; }
  .scan-confirm-overlay.open { display:flex; }
  .scan-confirm-modal { background:var(--surface); border-radius:24px 24px 0 0; padding:20px 18px 40px; width:100%; max-width:480px; border-top:1px solid var(--border); animation:slideUp 0.3s cubic-bezier(.4,0,.2,1); max-height:92vh; overflow-y:auto; }
  .scan-entry-card { background:var(--surface2); border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid var(--border); position:relative; }
  .scan-entry-card .field { margin-bottom:8px; }
  .scan-entry-card label { display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .scan-entry-card input,.scan-entry-card select { background:var(--surface3); border:1.5px solid var(--border); border-radius:8px; padding:8px 10px; font-family:'Sarabun',sans-serif; font-size:14px; color:var(--text); outline:none; width:100%; -webkit-appearance:none; }
  .scan-del-entry { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px; border-radius:6px; }
  .scan-ai-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(74,158,255,0.1); border:1px solid rgba(74,158,255,0.25); color:var(--blue); font-family:'Kanit',sans-serif; font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:0.5px; margin-bottom:14px; }

  /* CATEGORY MANAGER */
  .cat-mgr { background:var(--surface); border-radius:var(--radius); padding:14px 16px; border:1px solid var(--border); margin-bottom:10px; }
  .cat-item { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); }
  .cat-item:last-child { border-bottom:none; }
  .cat-name { font-size:13px; }
  .cat-del-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:14px; padding:4px 7px; border-radius:6px; }
  .cat-del-btn:hover { color:var(--red); }
  .cat-add-row { display:flex; gap:8px; margin-top:10px; }
  .cat-add-row input { flex:1; }
  .cat-add-btn { background:var(--accent); border:none; border-radius:8px; padding:8px 14px; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; color:#1a1000; cursor:pointer; }
  .export-btn { background:rgba(62,207,130,0.1); border:1.5px solid rgba(62,207,130,0.3); border-radius:8px; padding:6px 14px; color:var(--green); font-family:'Kanit',sans-serif; font-size:12px; font-weight:700; cursor:pointer; }

  /* LOADING */
  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; }
  .loading-spinner { width:40px; height:40px; border:3px solid rgba(240,165,0,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div style="flex:1">
      <div class="logo">BED <span class="word-light">Foodies</span> APP</div>
      <div class="logo-sub">Food Cost Projection</div>
      <div class="header-dateline" id="headerDateLine"></div>
    </div>
    <button class="admin-toggle-btn" onclick="toggleAdmin()" id="adminToggleBtn" title="Admin">🔐</button>
  </div>
  <div class="hotel-tabs">
    <button class="hotel-tab active" onclick="selectHotel('ALL',this)">BED</button>
    <button class="hotel-tab" onclick="selectHotel('BCK',this)">BCK</button>
    <button class="hotel-tab" onclick="selectHotel('BPS',this)">BPS</button>
    <button class="hotel-tab" onclick="selectHotel('BNM',this)">BNM</button>
    <button class="hotel-tab" onclick="selectHotel('BCG',this)">BCG</button>
  </div>
</div>

<!-- SYNC STATUS BAR -->
<div class="sync-bar" id="syncBar">
  <div class="sync-dot syncing" id="syncDot"></div>
  <span id="syncText" style="color:var(--muted)">Connecting...</span>
</div>

<div class="content" id="mainContent">
  <div class="loading-screen">
    <div class="loading-spinner"></div>
    <div style="color:var(--muted);font-size:13px;font-family:'Kanit',sans-serif;">Loading data...</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-btn active" id="nb-dashboard" onclick="goToDashboard()">
    <div class="ni">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="nl">Dashboard</div>
  </div>
  <div class="nav-btn" id="nb-history" onclick="goToHistory()">
    <div class="ni">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="2.2" rx="1.1" fill="currentColor"/>
        <rect x="3" y="9" width="18" height="2.2" rx="1.1" fill="currentColor"/>
        <rect x="3" y="14" width="13" height="2.2" rx="1.1" fill="currentColor"/>
        <rect x="3" y="19" width="8" height="2.2" rx="1.1" fill="currentColor"/>
      </svg>
    </div>
    <div class="nl">History</div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addModalTitle">New Purchase — <span id="modalHotel">BCK</span></div>
    <input type="hidden" id="editEntryId" value="">
    <div class="field"><label>Hotel</label>
      <select id="eHotel" onchange="document.getElementById('modalHotel').textContent=this.value">
        <option value="BCK">BCK</option><option value="BPS">BPS</option><option value="BNM">BNM</option><option value="BCG">BCG</option>
      </select>
    </div>
    <div class="field"><label>Category</label><select id="eSupplier"></select></div>
    <div class="field"><label>Amount (฿)</label><input type="number" id="eAmount" placeholder="0.00" inputmode="decimal"></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="eNote" placeholder="e.g. items purchased..."></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn-save" onclick="saveExpense()">Save ✓</button>
    </div>
  </div>
</div>

<!-- SCAN CONFIRM -->
<div class="scan-confirm-overlay" id="scanConfirmOverlay">
  <div class="scan-confirm-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Review <span>Scanned Entries</span></div>
    <div class="scan-ai-badge">✨ AI-extracted — please verify</div>
    <div class="field" style="margin-bottom:14px">
      <label>Save to Hotel</label>
      <select id="scanHotel">
        <option value="BCK">BCK</option><option value="BPS">BPS</option><option value="BNM">BNM</option><option value="BCG">BCG</option>
      </select>
    </div>
    <div id="scanEntriesContainer"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeScanConfirm()">Cancel</button>
      <button class="btn-save" onclick="saveAllScanned()">Save All ✓</button>
    </div>
  </div>
</div>

<!-- FORECAST MODAL -->
<div class="overlay" id="forecastOverlay">
  <div class="modal">

// ─── SYNC STATUS ──────────────────────────────────────────
function setSyncStatus(status, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(dot) { dot.className = 'sync-dot ' + status; }
  if(txt) { txt.textContent = text; txt.style.color = status === 'online' ? 'var(--green)' : status === 'offline' ? 'var(--red)' : 'var(--yellow)'; }
}

// ─── FIREBASE LISTENERS ───────────────────────────────────
function initFirebase() {
  setSyncStatus('syncing', 'Connecting to database...');

  // Timeout: if Firebase doesn't respond in 10s, show clear error
  const timeout = setTimeout(() => {
    if(!dbReady) {
      setSyncStatus('offline', 'Timeout — check internet/Firebase');
      document.getElementById('mainContent').innerHTML = `<div style="padding:20px;color:#e05555;font-family:monospace;font-size:12px;line-height:1.8"><b>🔴 Connection Timeout</b><br><br>Firebase did not respond after 10 seconds.<br><br>Possible causes:<br>• Internet connection issue<br>• Firebase project paused<br>• Browser blocking Firebase</div>`;
    }
  }, 10000);

  // Listen to expenses - real time (sorted client-side to avoid needing a Firestore index)
  const expQuery = collection(db, 'expenses');
  onSnapshot(expQuery, (snapshot) => {
    expenses = snapshot.docs
      .map(doc => ({ ...doc.data(), firestoreId: doc.id }))
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    setSyncStatus('online', 'Live — all hotels synced');
    clearTimeout(timeout);
    dbReady = true;
    render();
  }, (err) => {
    setSyncStatus('offline', err.code || 'Connection error');
    document.getElementById('mainContent').innerHTML = `<div style="padding:20px;color:#e05555;font-family:monospace;font-size:12px;word-break:break-all;line-height:1.8"><b>🔴 Firebase Error — screenshot this:</b><br><br><b>Code:</b> ${err.code}<br><b>Message:</b> ${err.message}</div>`;
    console.error('Expenses listener error:', err);
  });

  // Listen to settings (forecasts + categories)
  onSnapshot(doc(db, 'settings', 'main'), (snap) => {
    if(snap.exists()) {
      const data = snap.data();
      if(data.forecasts) forecasts = data.forecasts;
      if(data.categories) categories = data.categories;
      render();
    }
  }, (err) => { console.error('Settings listener error:', err); });
}

// ─── SAVE / UPDATE / DELETE ───────────────────────────────
async function addExpenseToFirebase(entry) {
  try {
    setSyncStatus('syncing', 'Saving...');
    await addDoc(collection(db, 'expenses'), { ...entry, timestamp: Date.now() });
  } catch(e) {
    showToast('Save failed — check connection', 'var(--red)');
    console.error(e);
  }
}

async function updateExpenseInFirebase(firestoreId, updates) {
  try {
    setSyncStatus('syncing', 'Updating...');
    await updateDoc(doc(db, 'expenses', firestoreId), updates);
  } catch(e) {
    showToast('Update failed', 'var(--red)');
    console.error(e);
  }
}

async function deleteExpenseFromFirebase(firestoreId) {
  try {
    setSyncStatus('syncing', 'Deleting...');
    await deleteDoc(doc(db, 'expenses', firestoreId));
  } catch(e) {
    showToast('Delete failed', 'var(--red)');
    console.error(e);
  }
}

async function saveSettings() {
  try {
    await setDoc(doc(db, 'settings', 'main'), { forecasts, categories });
  } catch(e) {
    showToast('Settings save failed', 'var(--red)');
    console.error(e);
  }
}

// ─── CALCULATIONS ─────────────────────────────────────────
function getSuppliers() { return categories.length ? categories : [...DEFAULT_SUPPLIERS]; }
function monthForecast(h) { return (forecasts[MONTH] && forecasts[MONTH][h]) || 0; }
function mtdRevenue(h) { return monthForecast(h) / DAYS_IN_MONTH * DAY_OF_MONTH; }
function mtdBudget(h) { return mtdRevenue(h) * 0.10; }
function mtdSpent(h) { return expenses.filter(e => e.date && e.date.startsWith(MONTH) && e.hotel === h).reduce((s,e) => s + e.amount, 0); }
function foodCostPct(h) { const rev = mtdRevenue(h); if(!rev) return 0; return (mtdSpent(h)/rev)*100; }
function barWidth(pct) { return Math.min((pct/20)*100, 100); }
function sc(p) { return p < 8 ? 'safe' : p < 10 ? 'warn' : 'danger'; }
function fmt(n) { return '฿' + Math.round(n).toLocaleString('en-US'); }
function fmtPct(n) { return (Math.round(n*10)/10) + '%'; }

  const rem = mtdBud - spent;
  return `<div class="stats4">
    <div class="s4box"><div class="s4val" style="color:var(--accent)">${forecast?fmt(forecast):'—'}</div><div class="s4lbl">Forecast</div></div>
    <div class="s4box"><div class="s4val" style="color:var(--blue)">${forecast?fmt(mtdRev):'—'}</div><div class="s4lbl">MTD Revenue</div></div>
    <div class="s4box"><div class="s4val" style="color:var(--red)">${fmt(spent)}</div><div class="s4lbl">MTD Spent</div></div>
    <div class="s4box"><div class="s4val" style="color:${rem<0?'var(--red)':'var(--green)'}">${forecast?fmt(rem):'—'}</div><div class="s4lbl">MTD Left</div></div>
  </div>`;
}

function progressHTML(s, bar) {
  return `<div class="prog-outer">
    <div class="prog-track">
      <div class="prog-fill p-${s}" style="width:${bar}%;height:100%;border-radius:100px;"></div>
      <div class="prog-marker"></div>
    </div>
    <div class="prog-labels">
      <span class="pl-l">0%</span><span class="pl-c">10%</span><span class="pl-r">20%</span>
    </div>
  </div>`;
}

function renderAll() {
  const cards = HOTELS.map(hotel => {
    const forecast = monthForecast(hotel);
    const mtdRev = mtdRevenue(hotel);
    const mtdBud = mtdBudget(hotel);
    const spent = mtdSpent(hotel);

    const s = sc(fcPct);
    const pctColor = s==='safe'?'var(--green)':s==='warn'?'var(--yellow)':'var(--red)';
    const bar = barWidth(fcPct);
    return `<div class="hotel-mini">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">

      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;text-align:right;margin-bottom:10px;">Forecast</div>
      ${stats4HTML(forecast,mtdRev,spent,mtdBud)}
      ${forecast?progressHTML(s,bar):''}
    </div>`;
  }).join('');

  const allToday = expenses.filter(e => e.date === TODAY).slice(0,8);

    </div>`).join('') : `<div class="empty"><div class="ei">🍽️</div>No purchases logged today</div>`;

  return `
    <div class="all-grid">${cards}</div>
    <div class="sec-title">Today's Entries</div>
    <div class="entry-list">${todayHtml}</div>`;
}

function renderHistory() {
  let filtered = (currentHotel==='ALL' ? [...expenses] : expenses.filter(e => e.hotel===currentHotel)).filter(e => e.date && e.date.startsWith(MONTH));
  const exportBtn = isAdmin ? `<button class="export-btn" onclick="exportCSV()">⬇️ Export CSV</button>` : '';
  const headerHtml = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">${exportBtn||'<span></span>'}</div>`;
  if(!filtered.length) return headerHtml + `<div class="empty" style="margin-top:20px"><div class="ei">📋</div>No entries this month${currentHotel!=='ALL'?' for '+currentHotel:''}</div>`;
  const grouped = {};
  filtered.forEach(e => { if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return headerHtml + Object.keys(grouped).sort().reverse().map(date => {
    const dayTotal = grouped[date].reduce((s,e) => s+e.amount, 0);
    const d = new Date(date+'T12:00:00');
    const label = date===TODAY ? '📅 Today' : `${dn[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
    const items = grouped[date].map(e => `
      <div class="entry-item">
        <div class="entry-dot" style="background:${SUP_COLORS[e.supplier]||'#6b7190'}"></div>
        <div class="entry-info"><div class="entry-sup">${SUP_ICONS[e.supplier]||'📦'} ${e.supplier}</div><div class="entry-note">${e.note||'No note'}</div></div>
        <div class="entry-right">${currentHotel==='ALL'?`<div class="entry-hotel-tag">${e.hotel}</div>`:''}<div class="entry-amt">-${fmt(e.amount)}</div><div class="entry-time">${e.time}</div></div>
        <div class="entry-actions">
          <button class="entry-action-btn edit" onclick="editEntry('${e.firestoreId}')" title="Edit">✏️</button>
          <button class="entry-action-btn del" onclick="deleteEntry('${e.firestoreId}')" title="Delete">🗑️</button>
        </div>
      </div>`).join('');
    return `<div class="sec-title"><span>${label}</span><span style="color:var(--accent)">${fmt(dayTotal)}</span></div><div class="entry-list" style="margin-bottom:6px">${items}</div>`;
  }).join('');
}

window.openForecastModal = function(hotel) {
  forecastingHotel=hotel;
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('forecastModalHotel').textContent=hotel;
  document.getElementById('forecastModalMonth').textContent=months[NOW.getMonth()];
  document.getElementById('forecastInput').value=monthForecast(hotel)||'';
  updateForecastPreview();
  document.getElementById('forecastOverlay').classList.add('open');
}
window.updateForecastPreview = function() {
  const val=parseFloat(document.getElementById('forecastInput').value)||0;
  const fullBudget=val*0.10, dailyRev=val/DAYS_IN_MONTH;
  const mRev=dailyRev*DAY_OF_MONTH, mBud=mRev*0.10;
  document.getElementById('forecastPreview').innerHTML=val?
    `📊 Full month food budget (10%) = <strong>${fmt(fullBudget)}</strong><br>
     📅 MTD revenue so far (Day ${DAY_OF_MONTH}) = <strong>${fmt(mRev)}</strong><br>
     🎯 MTD food budget (10% of MTD rev) = <strong>${fmt(mBud)}</strong><br>
     💡 Spend up to <strong>${fmt(mBud)}</strong> by end of today to stay at 10%`
    :'Enter a forecast amount to see the breakdown.';
}
const _fi=document.getElementById('forecastInput'); if(_fi) _fi.addEventListener('input', window.updateForecastPreview);
window.saveForecast = async function() {
  const val=parseFloat(document.getElementById('forecastInput').value);
  if(!val||val<=0){showToast('Please enter a valid forecast','#e05555');return;}
  if(!forecasts[MONTH]) forecasts[MONTH]={};
  forecasts[MONTH][forecastingHotel]=val;
  await saveSettings();
  document.getElementById('forecastOverlay').classList.remove('open');
  showToast(`Forecast saved for ${forecastingHotel}: ${fmt(val)}`);
  render();
}

window.saveExpense = async function() {
  const hotel=document.getElementById('eHotel').value;
  const supplier=document.getElementById('eSupplier').value;
  const amount=parseFloat(document.getElementById('eAmount').value);
  const note=document.getElementById('eNote').value.trim();
  const editId=document.getElementById('editEntryId').value;
  if(!amount||amount<=0){showToast('Please enter a valid amount','#e05555');return;}
  const t=new Date();
  const timeStr=t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(editId) {
    await updateExpenseInFirebase(editId, {hotel, supplier, amount, note});
    showToast(`Entry updated · ${hotel} · ${supplier}`);
  } else {
    await addExpenseToFirebase({hotel, supplier, amount, note, date:TODAY, time:timeStr});
    showToast(`${fmt(amount)} added · ${hotel} · ${supplier}`);
  }
  closeModals();
}
window.editEntry = function(firestoreId) {
  const entry = expenses.find(e => e.firestoreId === firestoreId);
  if(!entry) return;
  populateSupplierSelect(entry.supplier);
  document.getElementById('eHotel').value=entry.hotel;
  document.getElementById('modalHotel').textContent=entry.hotel;
  document.getElementById('eSupplier').value=entry.supplier;
  document.getElementById('eAmount').value=entry.amount;
  document.getElementById('eNote').value=entry.note||'';
  document.getElementById('editEntryId').value=firestoreId;
  document.getElementById('addModalTitle').innerHTML=`Edit Entry — <span id="modalHotel">${entry.hotel}</span>`;
  document.getElementById('addOverlay').classList.add('open');
}
window.deleteEntry = async function(firestoreId) {
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  await deleteExpenseFromFirebase(firestoreId);
  showToast('Entry deleted','var(--muted)');
}

// ─── TOAST ────────────────────────────────────────────────
window.showToast = function(msg, color='var(--green)') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}
// Attach overlay close-on-backdrop listeners (guard for module parse timing)
const _overlayIds = ['addOverlay','forecastOverlay'];
const _attachOverlays = () => _overlayIds.forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',_attachOverlays);
else _attachOverlays();

// ─── ADMIN ────────────────────────────────────────────────
window.toggleAdmin = function() {

  }

    isAdmin=true; updateAdminUI(); showToast('Admin mode on','var(--accent)'); render();

// ─── CATEGORY MANAGER ─────────────────────────────────────
function renderCategoryManager() {
  const cats=getSuppliers();
  const items=cats.map((c,i)=>`
    <div class="cat-item">
      <span class="cat-name">${SUP_ICONS[c]||'📦'} ${c}</span>
      <button class="cat-del-btn" onclick="deleteCategory(${i})">🗑️</button>
    </div>`).join('');
  return `<div class="cat-mgr">${items}
    <div class="cat-add-row">
      <input type="text" id="newCatInput" placeholder="New category name..." maxlength="40">
      <button class="cat-add-btn" onclick="addCategory()">+ Add</button>
    </div></div>`;
}
window.addCategory = async function() {
  const inp=document.getElementById('newCatInput');
  const name=(inp?inp.value:'').trim();
  if(!name){showToast('Enter a category name','var(--red)');return;}
  if(categories.includes(name)){showToast('Category already exists','var(--yellow)');return;}
  categories.push(name);
  await saveSettings();
  showToast(`Added: ${name}`); render();
}
window.deleteCategory = async function(idx) {
  if(!confirm('Delete this category?')) return;
  categories.splice(idx,1);
  await saveSettings();
  showToast('Category removed','var(--muted)'); render();
}

// ─── EXPORT CSV ───────────────────────────────────────────
window.exportCSV = function() {
  const hotel=currentHotel;
  let data=(hotel==='ALL'?[...expenses]:expenses.filter(e=>e.hotel===hotel)).filter(e=>e.date&&e.date.startsWith(MONTH));
  data.sort((a,b)=>a.date.localeCompare(b.date));
  const rows=[['Date','Hotel','Category','Amount (฿)','Notes']];
  data.forEach(e=>rows.push([e.date,e.hotel,e.supplier,e.amount,e.note||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`BED_Foodies_${hotel}_${MONTH}.csv`; a.click();
  URL.revokeObjectURL(url); showToast('CSV exported!');
}

  const cats=getSuppliers();

// ─── INVOICE SCANNING ─────────────────────────────────────
window.triggerScan = function() {
  const inp=document.getElementById('invoiceImageInput')||document.getElementById('globalInvoiceImageInput');
  if(!inp) return; inp.value=''; inp.click();
}
window.handleImageSelected = async function(event) {
  const file=event.target.files[0]; if(!file) return;
  const btn=document.getElementById('scanInvoiceBtn');
  const labelEl=document.getElementById('scanBtnLabel');
  const iconWrap=document.getElementById('scanIconWrap');
  if(btn) btn.style.opacity='0.65';
  if(labelEl) labelEl.textContent='Scanning…';
  if(iconWrap) iconWrap.innerHTML=`<div style="width:46px;height:46px;display:flex;align-items:center;justify-content:center"><span class="scan-spinner"></span></div>`;
  try {
    const base64Image=await fileToBase64(file);
    const entries=await scanInvoiceWithAI(base64Image,'image/jpeg');
    if(entries&&entries.length>0){ scannedEntries=entries; openScanConfirm(); }
    else { showToast('No items found — please enter manually','var(--muted)'); }
  } catch(e) { showToast('ERROR: '+e.message,'var(--red)'); }
  finally {
    if(btn) btn.style.opacity='1';
    if(labelEl) labelEl.textContent='Scan Invoice';
    if(iconWrap) iconWrap.innerHTML=SCAN_SVG;
  }
}
function fileToBase64(file) {
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=1200; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.7).split(',')[1]);
    };
    img.onerror=()=>reject(new Error('Image load failed'));
    img.src=url;
  });
}
async function scanInvoiceWithAI(base64Image, mediaType) {
  const cats=getSuppliers().join(', ');
  const prompt=`You are a hotel food cost assistant. Read this supplier invoice carefully. For each line item, assign it to the best matching category from: ${cats}. Then ADD UP the actual printed AMOUNT values for all items in each category - do NOT estimate, use only the real numbers from the invoice. Return one entry per category. Amounts in Thai Baht. The sum of all amounts should equal the invoice subtotal before VAT. Return JSON only, no markdown. Format: [{"vendor":"...","category":"...","amount":0}]`;
  const response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mediaType,data:base64Image}},
      {type:'text',text:prompt}
    ]}]})
  });
  if(!response.ok){
    const errBody=await response.text().catch(()=>'no body');
    throw new Error('HTTP '+response.status+': '+errBody.slice(0,200));
  }
  const data=await response.json();
  const text=data.content.map(b=>b.text||'').join('');
  const clean=text.replace(/```json|```/g,'').trim();
  let parsed;
  try{ parsed=JSON.parse(clean); }catch(pe){ throw new Error('Parse fail: '+clean.slice(0,100)); }
  if(!Array.isArray(parsed)) throw new Error('Bad format');
  const validCats=getSuppliers();
  return parsed.map(e=>({
    vendor:String(e.vendor||'Unknown').trim(),
    category:validCats.includes(e.category)?e.category:'Other',
    amount:parseFloat(e.amount)||0
  })).filter(e=>e.amount>0);
}
window.openScanConfirm = function() {
  const hotel=currentHotel==='ALL'?'BCK':currentHotel;
  document.getElementById('scanHotel').value=hotel;
  const container=document.getElementById('scanEntriesContainer');
  const cats=getSuppliers();
  const catOptions=cats.map(c=>`<option value="${c}">${SUP_ICONS[c]||'📦'} ${c}</option>`).join('');
  container.innerHTML=scannedEntries.map((e,i)=>`
    <div class="scan-entry-card" id="scanCard_${i}">
      <button class="scan-del-entry" onclick="removeScanEntry(${i})" title="Remove">✕</button>
      <div class="field"><label>Vendor</label><input type="text" id="sVendor_${i}" value="${e.vendor.replace(/"/g,'&quot;')}"></div>
      <div class="field"><label>Category</label><select id="sCat_${i}">${catOptions.replace(`value="${e.category}"`,`value="${e.category}" selected`)}</select></div>
      <div class="field"><label>Amount (฿)</label><input type="number" id="sAmt_${i}" value="${e.amount}" inputmode="decimal"></div>
    </div>`).join('');
  document.getElementById('scanConfirmOverlay').classList.add('open');
}
window.removeScanEntry = function(i) { const c=document.getElementById(`scanCard_${i}`);if(c)c.remove(); }
window.closeScanConfirm = function() { document.getElementById('scanConfirmOverlay').classList.remove('open'); }
window.saveAllScanned = async function() {
  const hotel=document.getElementById('scanHotel').value;
  const container=document.getElementById('scanEntriesContainer');
  const cards=container.querySelectorAll('.scan-entry-card');
  const t=new Date();
  const timeStr=t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  let saved=0;
  for(const card of cards){
    const i=card.id.replace('scanCard_','');
    const vendor=(document.getElementById(`sVendor_${i}`)?.value||'').trim();
    const category=document.getElementById(`sCat_${i}`)?.value||'Other';
    const amount=parseFloat(document.getElementById(`sAmt_${i}`)?.value);
    if(!amount||amount<=0) continue;
    await addExpenseToFirebase({hotel,supplier:category,amount,note:vendor,date:TODAY,time:timeStr});
    saved++;
  }
  if(saved===0){showToast('No valid entries to save','var(--red)');return;}
  closeScanConfirm();
  showToast(`${saved} entr${saved===1?'y':'ies'} saved from invoice ✓`);
}
